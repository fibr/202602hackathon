description: Servo zero offsets and joint signs for SO-ARM101
notes:
  calibrated_at: '2026-03-15 20:10:24'
  calibrated_by: servo_direction auto-calibration (ChArUco)
  default: 2048 (servo center) if no offset defined
  signs: +1 = motor and URDF agree, -1 = inverted
  usage: angle_deg = sign * (raw_position - zero_raw) * 360/4096
# URDF convention offsets (degrees): urdf_angle = motor_deg * sign + urdf_offset
# wrist_roll: the URDF mesh was 180deg rotated from the physical wrist at servo zero.
# Adding 180deg offset aligns the digital twin with reality.
urdf_offsets_deg:
  wrist_roll: 180.0
joint_signs:
  elbow_flex: 1
  shoulder_lift: 1
  shoulder_pan: -1
  wrist_flex: 1
  wrist_roll: -1
zero_offsets:
  elbow_flex:
    motor_id: 3
    zero_raw: 1956
  shoulder_lift:
    motor_id: 2
    zero_raw: 843
  shoulder_pan:
    motor_id: 1
    zero_raw: 2108
  wrist_flex:
    motor_id: 4
    zero_raw: 2968
  wrist_roll:
    motor_id: 5
    zero_raw: 2981
